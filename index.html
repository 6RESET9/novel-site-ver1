<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>我的书架</title>
  <meta name="description" content="我的私人小说站，零成本搭建在 Cloudflare 上">
  <meta property="og:title" content="我的书架">
  <meta property="og:description" content="私人小说站，零成本搭建在 Cloudflare 上">
  
  <link rel="stylesheet" href="/style.css?v=20260503b">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d4a574">
</head>
<body>
  <div class="navbar">
    <h1><a href="/">📚 我的书架</a></h1>
    <nav>
      <span id="nav-user"></span>
      <button class="nav-announcement-btn" id="announcement-open" type="button" hidden>公告</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </nav>
  </div>
  <div class="container">
    <div id="continue-reading"></div>
    <div id="reading-stats"></div>
    <div id="tag-filter"></div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索译名 / 原文名 / 作者 / 标签 / 上传人..." autocomplete="off">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div id="search-results" class="search-results" style="display:none"></div>
    <div id="content" class="loading">加载中...</div>
  </div>
  <div class="announcement-overlay" id="announcement-overlay" hidden>
    <section class="announcement-dialog" role="dialog" aria-modal="true" aria-labelledby="announcement-title">
      <h2 id="announcement-title">新公开分享</h2>
      <ul id="announcement-books"></ul>
      <button class="btn" id="announcement-confirm" type="button">知道了</button>
    </section>
  </div>
  <script src="/tag-search.js?v=20260430"></script>
  <script>
    // 主题
    const THEMES = ['light','dark','green','sepia','blue'];
    const THEME_ICONS = {'light':'🌙','dark':'☀️','green':'🍃','sepia':'📜','blue':'💧'};
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeBtn();
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const idx = THEMES.indexOf(current);
      const next = THEMES[(idx + 1) % THEMES.length];
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeBtn();
    }
    function updateThemeBtn() {
      const btn = document.querySelector('.theme-toggle');
      const t = document.documentElement.getAttribute('data-theme');
      btn.textContent = THEME_ICONS[t] || '🌙';
    }

    // 用户状态：仅显示当前用户与退出，不提供后台入口
    (async function renderUserStatus() {
      const navUser = document.getElementById('nav-user');
      try {
        const res = await fetch('/api/me', { credentials: 'same-origin' });
        if (res.ok) {
          const user = await res.json();
          const roleMap = {
            'super_admin': { label: '超管', cls: 'super' },
            'admin': { label: '管理', cls: 'admin' },
            'demo': { label: '用户', cls: 'demo' }
          };
          const r = roleMap[user.role] || { label: '用户', cls: 'demo' };
          // 使用 textContent 安全地设置用户名，防止 XSS
          const badge = document.createElement('span');
          badge.className = 'role-badge ' + r.cls;
          badge.textContent = r.label;
          navUser.textContent = '';
          navUser.appendChild(badge);
          navUser.appendChild(document.createTextNode(' ' + (user.username || '') + ' '));
          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.style.cssText = 'font-size:12px;color:#e74c3c;margin-left:6px';
          logoutLink.textContent = '退出';
          logoutLink.onclick = function() { doLogout(); return false; };
          navUser.appendChild(logoutLink);
        } else {
          navUser.textContent = '';
        }
      } catch {
        navUser.textContent = '';
      }
    })();

    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }); } catch {}
      location.reload();
    }

    // 继续阅读
    function renderContinueReading() {
      const container = document.getElementById('continue-reading');
      const entries = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith('reading_')) continue;
        try {
          const data = JSON.parse(localStorage.getItem(key));
          if (data && data.chapterId && data.time) entries.push(data);
        } catch {}
      }
      if (entries.length === 0) { container.innerHTML = ''; return; }
      entries.sort((a, b) => b.time - a.time);
      const latest = entries[0];
      const timeAgo = formatTimeAgo(latest.time);
      container.innerHTML = `
        <a class="continue-reading" href="/read.html?id=${latest.chapterId}">
          <div class="continue-info">
            <div class="continue-label">继续阅读</div>
            <div class="continue-title">${esc(latest.bookTitle || '未知书籍')}</div>
            <div class="continue-chapter">${esc(latest.chapterTitle || '')} · ${timeAgo}</div>
          </div>
          <div class="continue-arrow">→</div>
        </a>
      `;
    }
    function renderReadingStats() {
      const container = document.getElementById('reading-stats');
      try {
        const stats = JSON.parse(localStorage.getItem('readingStats'));
        if (!stats || (stats.totalSeconds === 0 && stats.totalChars === 0)) {
          container.innerHTML = '';
          return;
        }
        const hours = (stats.totalSeconds / 3600).toFixed(1);
        const wanChars = (stats.totalChars / 10000).toFixed(1);
        const days = (stats.days || []).length;
        container.innerHTML = `<div style="text-align:center;padding:8px 0;font-size:13px;color:var(--text-light)">已读 ${hours} 小时 · ${wanChars} 万字 · 累计 ${days} 天</div>`;
      } catch {
        container.innerHTML = '';
      }
    }
    function formatTimeAgo(ts) {
      const diff = Date.now() - ts;
      const min = Math.floor(diff / 60000);
      if (min < 1) return '刚刚';
      if (min < 60) return min + '分钟前';
      const hr = Math.floor(min / 60);
      if (hr < 24) return hr + '小时前';
      const day = Math.floor(hr / 24);
      return day + '天前';
    }

    // 搜索
    let allBooks = [];
    let allTags = [];
    let activeTagIds = new Set();
    const MAX_CARD_TAGS = 4;

    function doSearch() {
      const rawQuery = document.getElementById('search-input').value;
      const q = window.TagSearch ? window.TagSearch.normalizeText(rawQuery) : rawQuery.trim().toLowerCase();
      const resultsEl = document.getElementById('search-results');
      const contentEl = document.getElementById('content');
      if (!q) {
        resultsEl.style.display = 'none';
        contentEl.style.display = '';
        return;
      }
      const matched = allBooks.filter(b => {
        return buildBookSearchText(b).includes(q);
      });
      if (matched.length === 0) {
        resultsEl.innerHTML = '<div style="padding:16px;color:var(--text-light);text-align:center">没有找到匹配的书籍</div>';
      } else {
        resultsEl.innerHTML = matched.map(b => {
          const displayTitle = b.title || b.original_title || '?';
          let titleParts = [];
          if (b.title) titleParts.push(highlightMatch(esc(b.title), q));
          if (b.original_title) titleParts.push('原文名：' + highlightMatch(esc(b.original_title), q));
          const titleHtml = titleParts.length > 0 ? titleParts.join('<br>') : esc(displayTitle);
          return `
          <a class="result-item" href="/book.html?id=${b.id}">
            <div class="result-title">${titleHtml}</div>
            <div class="result-book">${formatSearchMeta(b, q)}</div>
          </a>
        `;
        }).join('');
      }
      resultsEl.style.display = '';
      contentEl.style.display = 'none';
    }
    function highlightMatch(text, q) {
      if (!q) return text;
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }
    function formatSearchMeta(book, q) {
      const parts = [];
      if (book.author) parts.push(highlightMatch(esc(book.author), q));
      if (book.ridi_rating != null) parts.push('⭐ ' + book.ridi_rating);
      if (book.uploader) parts.push('上传：' + highlightMatch(esc(book.uploader), q));
      const tagNames = (book.tags || []).map(t => t.name).join(' / ');
      if (tagNames) parts.push('标签：' + highlightMatch(esc(tagNames), q));
      parts.push(`${book.chapter_count}章 · ${formatWords(book.total_words)}`);
      return parts.join(' · ');
    }
    function buildBookSearchText(book) {
      const tagNames = (book.tags || []).map(t => t.name || '').join(' ');
      const tagIndex = window.TagSearch ? window.TagSearch.buildIndex(tagNames) : tagNames.toLowerCase();
      return [
        book.title,
        book.original_title,
        book.author,
        book.uploader,
        tagNames,
        tagIndex
      ].map(v => String(v || '').toLowerCase()).join(' ');
    }
    // 搜索防抖定时器
    let searchDebounceTimer = null;
    const SEARCH_DEBOUNCE_MS = 300; // 防抖时间300ms，平衡响应速度和性能

    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        // 回车键立即搜索，清除防抖
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        doSearch();
      }
    });
    document.getElementById('search-input').addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (!query) {
        // 清空时立即隐藏结果
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('content').style.display = '';
        return;
      }
      // 防抖搜索：300ms后自动执行
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(doSearch, SEARCH_DEBOUNCE_MS);
    });

    async function loadBooks() {
      const el = document.getElementById('content');
      try {
        const [booksRes, tagsRes] = await Promise.all([
          fetch('/api/books'),
          fetch('/api/tags').catch(() => ({ json: () => ({ tags: [] }) }))
        ]);
        const booksData = await booksRes.json();
        if (!booksRes.ok) throw new Error('加载失败');
        allBooks = booksData.books || [];

        try { allTags = (await tagsRes.json()).tags || []; } catch { allTags = []; }
        renderTagFilter();

        renderContinueReading();
        renderReadingStats();
        renderBooks(allBooks);
      } catch (e) {
        el.innerHTML = `<div class="msg msg-error">加载失败：${esc(e.message)}</div>`;
      }
    }

function renderTagFilter() {
      const container = document.getElementById('tag-filter');
      if (allTags.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = '<div class="tag-filter-bar" id="tag-bar"></div>';
      const bar = document.getElementById('tag-bar');
      const totalBookCount = allBooks.length;
      const allPill = document.createElement('span');
      allPill.className = 'tag-pill' + (activeTagIds.size === 0 ? ' active' : '');
      const allLabel = document.createElement('span');
      allLabel.className = 'tag-pill-label';
      allLabel.textContent = '\u5168\u90e8';
      allPill.appendChild(allLabel);
      const allCount = document.createElement('span');
      allCount.className = 'tag-pill-count';
      allCount.textContent = String(totalBookCount);
      allPill.appendChild(allCount);
      bar.appendChild(allPill);
      for (const tag of allTags) {
        const pill = document.createElement('span');
        pill.className = 'tag-pill' + (activeTagIds.has(tag.id) ? ' active' : '');
        pill.dataset.tagId = tag.id;
        const label = document.createElement('span');
        label.className = 'tag-pill-label';
        label.textContent = tag.name;
        pill.appendChild(label);
        const count = document.createElement('span');
        count.className = 'tag-pill-count';
        count.textContent = String(tag.book_count || 0);
        pill.appendChild(count);
        bar.appendChild(pill);
      }
      bar.addEventListener('click', (e) => {
        const pill = e.target.closest('.tag-pill');
        if (!pill) return;
        const tagId = pill.dataset.tagId ? Number(pill.dataset.tagId) : null;
        if (tagId === null) {
          // 点击"全部"，清空所有选中
          activeTagIds.clear();
        } else {
          // 多选：点击切换选中状态
          if (activeTagIds.has(tagId)) {
            activeTagIds.delete(tagId);
          } else {
            activeTagIds.add(tagId);
          }
        }
        renderTagFilter();
        filterAndRenderBooks();
      });
    }

    function filterAndRenderBooks() {
      let filtered = allBooks;
      if (activeTagIds.size > 0) {
        filtered = allBooks.filter(b => {
          const bookTagIds = (b.tags || []).map(t => t.id);
          // AND 逻辑：书籍必须包含所有选中的标签
          return [...activeTagIds].every(tid => bookTagIds.includes(tid));
        });
      }
      renderBooks(filtered);
    }

    // 封面颜色生成
    const COVER_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'];
    function coverColor(title) { let h = 0; for (let i = 0; i < (title||'').length; i++) h = ((h << 5) - h + title.charCodeAt(i)) | 0; return COVER_COLORS[Math.abs(h) % COVER_COLORS.length]; }

    function renderBooks(books) {
      const el = document.getElementById('content');
      if (books.length === 0) {
        if (allBooks.length === 0) {
          el.className = '';
          el.innerHTML = '<div class="empty"><p>📖 书架空空如也</p><p>请前往 /admin.html 添加第一本书</p></div>';
        } else {
          el.className = '';
          el.innerHTML = '<div class="empty"><p>没有匹配的书籍</p></div>';
        }
        return;
      }
      el.className = 'book-grid-cover';
      el.innerHTML = books.map(b => {
        const visibleTags = (b.tags || []).slice(0, MAX_CARD_TAGS);
        const hiddenTagCount = Math.max(0, (b.tags || []).length - visibleTags.length);
        const tagsHtml = visibleTags.map(t => `<span class="tag-pill tag-pill-display">${esc(t.name)}</span>`).join('') +
          (hiddenTagCount ? `<span class="tag-pill tag-pill-display tag-pill-more">+${hiddenTagCount}</span>` : '');
        // 构建标题区域：译名 + 原文名
        const displayTitle = b.title || b.original_title || '?';
        let titleHtml = '';
        if (b.title) titleHtml += `<h3>${esc(b.title)}</h3>`;
        if (b.original_title) titleHtml += `<div class="original-title">原文名：${esc(b.original_title)}</div>`;
        if (!b.title && !b.original_title) titleHtml = `<h3>?</h3>`;
        // ridi评分
        const ratingHtml = b.ridi_rating != null ? `<div class="card-rating">⭐ ${b.ridi_rating}</div>` : '';
        const color = coverColor(displayTitle);
        const firstChar = (displayTitle || '?')[0];
        if (b.cover_key) {
          return `<a class="book-card-cover" href="/book.html?id=${b.id}">
            <img class="cover-img" src="/api/covers/${b.id}" alt="${esc(displayTitle)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="cover-placeholder cover-fallback" style="display:none;background:${color}">${esc(firstChar)}</div>
            <div class="card-body">
              ${titleHtml}
              <div class="meta">${b.author ? esc(b.author) + ' · ' : ''}${b.chapter_count}章</div>
              ${ratingHtml}
              ${tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : ''}
            </div>
          </a>`;
        } else {
          return `<a class="book-card-cover" href="/book.html?id=${b.id}">
            <div class="cover-placeholder" style="background:${color}">${esc(firstChar)}</div>
            <div class="card-body">
              ${titleHtml}
              <div class="meta">${b.author ? esc(b.author) + ' · ' : ''}${b.chapter_count}章</div>
              ${ratingHtml}
              ${tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : ''}
            </div>
          </a>`;
        }
      }).join('');
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function formatWords(n) {
      if (n >= 10000) return (n / 10000).toFixed(1) + ' 万字';
      return n + ' 字';
    }
    loadBooks();

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(() => {});
    }

    function parseAnnouncementBooks(raw) {
      return String(raw || '').split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .slice(0, 50);
    }

    function getAnnouncementVersion(settings, books) {
      const explicit = String(settings.announcement_version || '').trim();
      if (explicit) return explicit;
      return [settings.announcement_title || '', ...books].join('|');
    }

    let currentAnnouncementSettings = null;
    let currentAnnouncementBooks = [];

    function showAnnouncementDialog(settings, books, version, markSeenOnConfirm) {
      const overlay = document.getElementById('announcement-overlay');
      const title = document.getElementById('announcement-title');
      const list = document.getElementById('announcement-books');
      const btn = document.getElementById('announcement-confirm');
      title.textContent = settings.announcement_title || '新公开分享';
      list.innerHTML = '';
      books.forEach(name => {
        const item = document.createElement('li');
        item.textContent = name;
        list.appendChild(item);
      });
      overlay.hidden = false;
      requestAnimationFrame(() => overlay.classList.add('active'));
      btn.onclick = () => {
        if (markSeenOnConfirm) localStorage.setItem('announcement_seen_version', version);
        overlay.classList.remove('active');
        setTimeout(() => { overlay.hidden = true; }, 180);
      };
      btn.focus();
    }

    function setupAnnouncement(settings) {
      if (settings.announcement_enabled !== 'true') return;
      const books = parseAnnouncementBooks(settings.announcement_books);
      if (books.length === 0) return;
      const version = getAnnouncementVersion(settings, books);
      currentAnnouncementSettings = settings;
      currentAnnouncementBooks = books;
      const openBtn = document.getElementById('announcement-open');
      openBtn.hidden = false;
      openBtn.onclick = () => showAnnouncementDialog(currentAnnouncementSettings, currentAnnouncementBooks, version, false);
      if (localStorage.getItem('announcement_seen_version') === version) return;
      showAnnouncementDialog(settings, books, version, true);
    }

    // 加载站点设置
    fetch('/api/settings').then(r => r.json()).then(d => {
      const s = d.settings || {};
      if (s.site_name) {
        document.title = s.site_name;
        document.querySelector('.navbar h1 a').textContent = '📚 ' + s.site_name;
        document.querySelector('meta[property="og:title"]').content = s.site_name;
      }
      if (s.site_desc) {
        document.querySelector('meta[name="description"]').content = s.site_desc;
        document.querySelector('meta[property="og:description"]').content = s.site_desc;
      }
      setupAnnouncement(s);
    }).catch(() => {});
  </script>
</body>
</html>
